name: Smoke

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      run_real_electron:
        description: "Run the real Electron boot smoke in xvfb"
        required: false
        default: false
        type: boolean

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux xvfb xauth

      - name: Install npm dependencies
        run: npm ci

      - name: Static validation
        run: |
          python3 -m py_compile scripts/codex_agent.py tests/smoke_runner.py
          bash -n tests/run-smoke-tests.sh scripts/launch-agent-swarm.sh scripts/install-codex-agent-shell.sh scripts/codex-agent
          node --check server/swarm-server.js
          node --check server/index.js
          node --check desktop/main.cjs

      - name: Run smoke suite
        run: env AI_AGENT_SMOKE_TESTS=wrapper,swarm-launcher,web-two-panel,swarm-stop npm test

  electron-smoke:
    needs: smoke
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_real_electron == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux xvfb xauth

      - name: Install npm dependencies
        run: npm ci

      - name: Run real Electron smoke
        run: xvfb-run -a env AI_AGENT_SMOKE_TESTS=wrapper,swarm-launcher,web-two-panel,real-electron,swarm-stop AI_AGENT_SMOKE_ELECTRON_REAL=1 python3 tests/smoke_runner.py
