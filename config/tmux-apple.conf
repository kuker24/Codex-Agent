set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g status on
set -g status-position top
set -g status-justify absolute-centre
set -g status-left-length 80
set -g status-right-length 120
set -g status-style "bg=#141416,fg=#f5f5f7"
set -g status-left "#[bg=#141416,fg=#ff5f57]● #[fg=#febc2e]● #[fg=#28c840]● #[fg=#8e8e93]  AI Agent Hub"
set -g status-right "#[bg=#141416,fg=#8e8e93]Session #[fg=#f5f5f7]#S  #[fg=#8e8e93]Folder #[fg=#64d2ff]#{b:pane_current_path}  #[fg=#8e8e93]%H:%M "
set -g status-format[0] "#[bg=#141416]#{?window_zoomed_flag,#[fg=#ff9f0a]▣ Zoom,}#{?client_prefix,#[fg=#bf5af2] Prefix,}"

set -g message-style "bg=#0a84ff,fg=#ffffff"
set -g message-command-style "bg=#2c2c2e,fg=#f5f5f7"
set -g mode-style "bg=#0a84ff,fg=#ffffff"
set -g clock-mode-colour "#64d2ff"
set -g display-time 2500

set -g pane-border-status top
set -g pane-border-lines single
set -g pane-border-style "fg=#3a3a3c"
set -g pane-active-border-style "fg=#0a84ff"
set -g pane-border-format "#{?pane_active,#[bg=#0a84ff,fg=#ffffff,bold] ◉ #T #[fg=#0a84ff] ›,#[bg=#2c2c2e,fg=#8e8e93] ○ #T #[fg=#5c5c60] ›}#[bg=#141416,fg=#8e8e93]  #P  #{pane_width}x#{pane_height}  "

set -g remain-on-exit on
set -g mouse on
set -g set-clipboard on
set -g history-limit 20000
setw -g aggressive-resize on
setw -g window-status-current-format ""
setw -g window-status-format ""
